# ~/.tmux.conf
# Bottom status bar is fully green = "you're inside tmux".
# When ^b (prefix) is pressed, an amber PREFIX badge appears on the left and
# the right side swaps to a Zellij-style cheat sheet grouped by SESSION /
# WINDOW / PANE. When idle, the right side shows the most common ^b X = Y
# reminders so the bindings are always one glance away.

set -g mouse on
set -g renumber-windows on
set -g history-limit 100000
set -g status-interval 1

# --- Status bar: bottom, full green ---
set -g status on
set -g status-position bottom
set -g status-style "bg=colour34,fg=black,bold"

# Left: session name, plus a PREFIX badge while ^b is held.
set -g status-left "#[bg=black,fg=colour34,bold] #S #[bg=colour34,fg=black,bold]#{?client_prefix,#[bg=colour208#,fg=black#,bold] PREFIX #[bg=colour34#,fg=black#,bold] , }"
set -g status-left-length 50

# Right: shortcut hints. Idle = condensed always-on reminders.
#        Prefix mode = bare keys grouped SESSION / WINDOW / PANE (Zellij-style).
set -g status-right "#{?client_prefix,#[bg=colour208#,fg=black#,bold] SES #[bg=colour34#,fg=black#,nobold] d:detach s:switch $:rename #[bg=colour33#,fg=white#,bold] WIN #[bg=colour34#,fg=black#,nobold] c:new #,:rename n:next p:prev w:list #[bg=colour129#,fg=white#,bold] PANE #[bg=colour34#,fg=black#,nobold] %%:vsplit \":hsplit z:zoom x:kill o:next arrows:nav ,#[bg=colour34#,fg=black] ^b c=new │ ^b #,=rename │ ^b %%=vsplit │ ^b \"=hsplit │ ^b z=zoom │ ^b x=kill │ ^b d=detach │ ^b ?=help }#[bg=black,fg=colour34,bold] %H:%M "
set -g status-right-length 300

# --- Window list ---
set -g window-status-format " #I:#W#F "
set -g window-status-current-format "#[bg=black,fg=colour34,bold] #I:#W#F #[bg=colour34,fg=black,bold]"
set -g window-status-style "bg=colour34,fg=black"
set -g window-status-current-style "bg=black,fg=colour34,bold"

# --- Panes ---
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour34,bold"
set -g pane-border-status top
set -g pane-border-format " #{pane_index}: #{pane_current_command} "
